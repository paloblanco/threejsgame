<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LD59</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    canvas { display: block; }

    #jump-btn {
      position: fixed;
      bottom: 40px;
      right: 40px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid rgba(255, 255, 255, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 22px;
      user-select: none;
      touch-action: none;
    }

    #joystick-base {
      position: fixed;
      bottom: 40px;
      left: 40px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.3);
      display: none;
      pointer-events: none;
    }

    #joystick-thumb {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    #hud {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-family: sans-serif;
      color: #fff;
      text-shadow: 1px 2px 6px rgba(0, 0, 0, 0.8);
      letter-spacing: 0.06em;
      pointer-events: none;
      display: none;
      text-align: center;
      white-space: nowrap;
    }

    #hud-level {
      font-size: clamp(0.8rem, 2.5vw, 1.1rem);
      font-weight: 700;
    }

    #hud-stats {
      font-size: clamp(0.65rem, 2vw, 0.85rem);
      font-weight: 400;
      opacity: 0.85;
      margin-top: 2px;
    }

    #title-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-family: sans-serif;
      color: #fff;
      text-shadow: 2px 3px 8px rgba(0, 0, 0, 0.9);
    }

    #title-screen h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      margin: 0 0 0.4em;
    }

    #title-screen .subtitle {
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      font-weight: 400;
      opacity: 0.85;
      margin: 0 0 2em;
      letter-spacing: 0.06em;
    }

    #title-screen .prompt {
      /* inherits .screen-prompt via class */
    }

    @keyframes titleBlink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* Shared prompt style used by both title and finish screens */
    .screen-prompt {
      font-size: clamp(1rem, 3vw, 1.5rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      animation: titleBlink 1.3s ease-in-out infinite;
    }

    #levelcomplete-screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.5);
      pointer-events: none;
      font-family: sans-serif;
      color: #fff;
      text-shadow: 1px 2px 6px rgba(0, 0, 0, 0.9);
    }

    #levelcomplete-screen h2 {
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      margin: 0 0 0.5em;
    }

    #levelcomplete-screen .stats {
      font-size: clamp(0.9rem, 2.5vw, 1.3rem);
      font-weight: 400;
      opacity: 0.9;
      line-height: 1.9;
      text-align: center;
      margin: 0 0 1.6em;
    }

    #finish-screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      font-family: sans-serif;
      color: #fff;
      text-shadow: 2px 3px 8px rgba(0, 0, 0, 0.9);
    }

    #finish-screen h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      margin: 0 0 0.6em;
    }

    #finish-screen .stats {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 400;
      opacity: 0.9;
      line-height: 1.8;
      text-align: center;
      margin: 0 0 1.8em;
    }

    /* Iris-wipe transition overlay — sits above every other element. */
    #transition-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      /* JS sets background each frame; start fully transparent. */
    }

    #pause-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #pause-btn:hover { background: rgba(0, 0, 0, 0.55); }

    #pause-screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      z-index: 500;
      font-family: sans-serif;
      color: #fff;
      text-shadow: 2px 3px 8px rgba(0, 0, 0, 0.9);
    }

    #pause-screen h2 {
      font-size: clamp(2rem, 7vw, 4rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      margin: 0 0 1.2em;
    }

    .pause-menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: stretch;
      min-width: 220px;
    }

    .pause-menu button {
      padding: 12px 24px;
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 600;
      letter-spacing: 0.05em;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      text-shadow: none;
      transition: background 0.15s;
    }
    .pause-menu button:hover { background: rgba(255, 255, 255, 0.25); }
  </style>
</head>
<body>
  <div id="joystick-base"><div id="joystick-thumb"></div></div>
  <div id="jump-btn">▲</div>

  <button id="pause-btn">&#9646;&#9646;</button>

  <div id="pause-screen">
    <h2>PAUSED</h2>
    <div class="pause-menu">
      <button id="pause-fullscreen-btn">Toggle Full Screen</button>
      <button id="pause-resume-btn">Resume</button>
    </div>
  </div>

  <div id="hud">
    <div id="hud-level"></div>
    <div id="hud-stats"></div>
  </div>

  <div id="title-screen">
    <h1>Signal Game</h1>
    <p class="subtitle">Palo Blanco Games 2026 &mdash; LD59</p>
    <p class="prompt screen-prompt">Press Jump to Begin</p>
  </div>

  <div id="levelcomplete-screen">
    <h2>Good Job!</h2>
    <div class="stats">
      <p id="lc-level-time"></p>
      <p id="lc-deaths"></p>
      <p id="lc-total-time"></p>
    </div>
    <p class="screen-prompt">Press Jump to Continue</p>
  </div>

  <div id="finish-screen">
    <h1>Good Job!</h1>
    <div class="stats">
      <p id="finish-time"></p>
      <p id="finish-deaths"></p>
    </div>
    <p class="screen-prompt">Press Jump to Play Again</p>
  </div>

  <div id="transition-overlay"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
